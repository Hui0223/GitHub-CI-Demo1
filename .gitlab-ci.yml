# =============================================================
# GitLab CI — 与 .github/workflows/ci.yml 对照学习
# =============================================================
# 概念映射:
#   GitHub Actions          GitLab CI
#   workflow                pipeline (整个 .gitlab-ci.yml)
#   job                     job
#   needs                   needs
#   steps / run             script
#   uses: actions/...       image / before_script / 社区 template
#   on: push                only: [main] + rules
# =============================================================

stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.12"

.python_setup: &python_setup
  image: python:${PYTHON_VERSION}-slim
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip

# ── Stage 1: Lint ─────────────────────────────────────────────
lint:
  <<: *python_setup
  stage: lint
  script:
    - pip install ruff
    - ruff check app/ tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Stage 2: Test ─────────────────────────────────────────────
test:
  <<: *python_setup
  stage: test
  needs: [lint]
  script:
    - pip install -r requirements-dev.txt
    - pytest --tb=short -v
  artifacts:
    when: always
    reports:
      junit: junit.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Stage 3: Build ────────────────────────────────────────────
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  needs: [test]
  script:
    - docker build -t cicd-demo:$CI_COMMIT_SHA .
    - docker run -d --name test-container -p 8000:8000 cicd-demo:$CI_COMMIT_SHA
    - sleep 3
    - apk add --no-cache curl
    - curl -f http://localhost:8000/health
    - docker stop test-container
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
